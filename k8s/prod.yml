apiVersion: v1
kind: Namespace
metadata:
  name: learnwithai-prod
---
# Backend ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: learnwithai-prod
data:
  APP_NAME: "LearnWithAI"
  DEBUG: "false"
  DEFAULT_MODEL: "llama3.2"
  QUIZ_MODEL: "mistral"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  CORS_ORIGINS: '["https://learnwithai.app", "https://www.learnwithai.app"]'
  # Connect to existing PostgreSQL on host
  DATABASE_URL: "postgresql+asyncpg://admin:admin@123@10.0.0.131:30432/learnwithai"
  # Connect to existing Ollama on host
  OLLAMA_BASE_URL: "http://10.0.0.131:30434"
---
# Backend Secret (Change these values!)
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: learnwithai-prod
type: Opaque
stringData:
  secret-key: "CHANGE_THIS_TO_A_32_CHAR_SECRET_KEY_123456789012345"
---
# FastAPI Backend Deployment (Production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: learnwithai-prod
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: learnwithai-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DATABASE_URL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: OLLAMA_BASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: secret-key
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DEBUG
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: APP_NAME
            - name: DEFAULT_MODEL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DEFAULT_MODEL
            - name: QUIZ_MODEL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: QUIZ_MODEL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: CORS_ORIGINS
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: learnwithai-prod
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: learnwithai-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: learnwithai-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: backend
