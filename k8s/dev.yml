apiVersion: v1
kind: Namespace
metadata:
  name: learnwithai-dev
---
# Backend ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: learnwithai-dev
data:
  APP_NAME: "LearnWithAI Dev"
  DEBUG: "true"
  DEFAULT_MODEL: "llama3.2"
  QUIZ_MODEL: "mistral"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  CORS_ORIGINS: '["*"]'
  # Connect to existing PostgreSQL on host
  DATABASE_URL: "postgresql+asyncpg://admin:admin@123@10.0.0.131:30432/learnwithai"
  # Connect to existing Ollama on host
  OLLAMA_BASE_URL: "http://10.0.0.131:30434"
---
# Backend Secret
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: learnwithai-dev
type: Opaque
stringData:
  secret-key: "dev-secret-key-change-in-production"
---
# FastAPI Backend Deployment (Development)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: learnwithai-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: learnwithai-backend:latest
          imagePullPolicy: Never  # Use local image for dev
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DATABASE_URL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: OLLAMA_BASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: secret-key
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DEBUG
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: APP_NAME
            - name: DEFAULT_MODEL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DEFAULT_MODEL
            - name: QUIZ_MODEL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: QUIZ_MODEL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: CORS_ORIGINS
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
# Backend Service (NodePort for external access)
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: learnwithai-dev
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
