apiVersion: v1
kind: Namespace
metadata:
  name: learnwithai-dev
---
# Backend ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: learnwithai-dev
data:
  APP_NAME: "LearnWithAI Dev"
  DEBUG: "true"
  DEFAULT_MODEL: "llama3.2"
  QUIZ_MODEL: "mistral"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  CORS_ORIGINS: '["*"]'
  DATABASE_URL: "postgresql+asyncpg://admin:admin@123@10.0.0.131:30432/learnwithai"
  OLLAMA_BASE_URL: "http://10.0.0.131:30434"
---
# Backend Secret
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: learnwithai-dev
type: Opaque
stringData:
  secret-key: "dev-secret-key-change-in-production"
---
# FastAPI Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: learnwithai-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/learnmv/learnwithai/backend:develop
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DATABASE_URL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: OLLAMA_BASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: secret-key
            - name: DEBUG
              value: "true"
            - name: APP_NAME
              value: "LearnWithAI Dev"
            - name: DEFAULT_MODEL
              value: "llama3.2"
            - name: QUIZ_MODEL
              value: "mistral"
            - name: CORS_ORIGINS
              value: '["*"]'
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: learnwithai-dev
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: learnwithai-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/learnmv/learnwithai/frontend:develop
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: learnwithai-dev
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
