version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: learnwithai-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin@123
      POSTGRES_DB: learnwithai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d learnwithai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: learnwithai-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Pre-download models on startup
    entrypoint: |
      sh -c '
        /bin/ollama serve &
        sleep 10
        echo "Downloading models..."
        ollama pull llama3.2 || true
        ollama pull mistral || true
        echo "Models ready"
        wait
      '
    deploy:
      resources:
        limits:
          memory: 4G

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: learnwithai-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin@123@postgres:5432/learnwithai
      - OLLAMA_BASE_URL=http://ollama:11434
      - SECRET_KEY=your-super-secret-key-change-in-production
      - DEBUG=true
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
