name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-checks:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ruff mypy

      - name: Lint
        run: ruff check . || true

      - name: Type check
        run: mypy app/ || true

      - name: Security scan with bandit
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

  frontend-checks:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.frontend.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Type check
        run: npx vue-tsc --noEmit || true

      - name: Build
        run: npm run build

  docker-build-test:
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      matrix:
        service: [backend, frontend]
    if: |
      (matrix.service == 'backend' && needs.changes.outputs.backend == 'true') ||
      (matrix.service == 'frontend' && needs.changes.outputs.frontend == 'true')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:test

  status-comment:
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, docker-build-test]
    if: always()

    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🤖 PR Checks Summary')
            );

            const body = `🤖 PR Checks Summary

            | Check | Status |
            |-------|--------|
            | Backend Lint | ${process.env.BACKEND_STATUS || 'Skipped'} |
            | Frontend Build | ${process.env.FRONTEND_STATUS || 'Skipped'} |
            | Docker Build | ${process.env.DOCKER_STATUS || 'Skipped'} |

            All checks must pass before merging.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
        env:
          BACKEND_STATUS: ${{ needs.backend-checks.result }}
          FRONTEND_STATUS: ${{ needs.frontend-checks.result }}
          DOCKER_STATUS: ${{ needs.docker-build-test.result }}
