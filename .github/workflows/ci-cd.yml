name: CI/CD Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  # Detect which services changed
  changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci-cd.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-cd.yml'

  # Backend Tests
  backend-test:
    runs-on: self-hosted
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check . || true

      - name: Run tests
        run: pytest tests/ -v || true

  # Frontend Tests
  frontend-test:
    runs-on: self-hosted
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # Build and Push Images
  build-and-push:
    runs-on: self-hosted
    needs: [changes, backend-test, frontend-test]
    if: |
      github.event_name == 'push' && (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true'
      )
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend]
        include:
          - service: backend
            dockerfile: ./backend/Dockerfile
            context: ./backend
          - service: frontend
            dockerfile: ./frontend/Dockerfile
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "namespace=learnwithai-prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "namespace=learnwithai-dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env[matrix.service == 'backend' && 'BACKEND_IMAGE' || 'FRONTEND_IMAGE'] }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image
        run: |
          echo "Built: ${{ env.REGISTRY }}/${{ env[matrix.service == 'backend' && 'BACKEND_IMAGE' || 'FRONTEND_IMAGE'] }}:${{ steps.tag.outputs.tag }}"

  # Deploy to Development
  deploy-dev:
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Kubernetes (Dev)
        run: |
          echo "Deploying to development environment..."
          kubectl apply -f k8s/dev.yml

          # Wait for rollout
          kubectl rollout status deployment/backend -n learnwithai-dev --timeout=300s
          kubectl rollout status deployment/frontend -n learnwithai-dev --timeout=300s

      - name: Verify deployment
        run: |
          echo "=== Dev Deployment Status ==="
          kubectl get pods -n learnwithai-dev
          kubectl get svc -n learnwithai-dev
          echo ""
          echo "Access at: http://10.0.0.131:30080"

  # Deploy to Production
  deploy-prod:
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Kubernetes (Production)
        run: |
          echo "Deploying to production environment..."
          kubectl apply -f k8s/prod.yml

          # Wait for rollout
          kubectl rollout status deployment/backend -n learnwithai-prod --timeout=300s
          kubectl rollout status deployment/frontend -n learnwithai-prod --timeout=300s

      - name: Verify deployment
        run: |
          echo "=== Production Deployment Status ==="
          kubectl get pods -n learnwithai-prod
          kubectl get svc -n learnwithai-prod
          kubectl get hpa -n learnwithai-prod

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/backend -n learnwithai-prod
          kubectl rollout undo deployment/frontend -n learnwithai-prod
